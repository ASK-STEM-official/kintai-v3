name: Force Logout All

on:
  schedule:
    - cron: '50 13 * * *'  # 毎日 22:50 JST (13:50 UTC)
  workflow_dispatch:

jobs:
  force-logout:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Call force-logout-all endpoint
        env:
          KINTAI_SITE_URL: ${{ secrets.KINTAI_SITE_URL }}
        run: |
          for i in 1 2 3; do
            echo "attempt $i"
            curl -s "$KINTAI_SITE_URL/api/admin/force-logout-all"
            if [ $i -lt 3 ]; then sleep 300; fi
          done
